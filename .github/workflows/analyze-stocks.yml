name: India Stock Market Analysis

on:
  schedule:
    - cron: '0 9 * * 1-5'  # Every weekday at 9 AM IST
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m nltk.downloader vader_lexicon punkt -d ~/nltk_data
      
      - name: Configure environment
        run: |
          echo "TZ=Asia/Kolkata" >> $GITHUB_ENV
      
      - name: Run analysis
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python main.py --config config.yaml --report --notify
      
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: stock-analysis-reports
          path: reports/
          retention-days: 7
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: analysis-logs
          path: logs/
          retention-days: 7
      
      - name: Create GitHub Issue with Summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('reports/summary.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Stock Market Analysis - ${new Date().toLocaleDateString('en-IN')}`,
              body: summary,
              labels: ['stock-analysis']
            });